# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: honjin

builds:
  - main: ./cmd/jin
    binary: jin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/takaaki-s/honjin/internal/version.Version={{.Version}}
      - -X github.com/takaaki-s/honjin/internal/version.Commit={{.ShortCommit}}
      - -X github.com/takaaki-s/honjin/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "^Merge remote-tracking"
  groups:
    - title: Features
      regexp: '^feat'
    - title: Bug Fixes
      regexp: '^fix'
    - title: Others
      order: 999

release:
  github:
    owner: takaaki-s
    name: honjin
  draft: false
  prerelease: auto
