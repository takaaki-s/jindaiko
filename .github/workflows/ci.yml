name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@55c2c1448f86e01eaae002a5a3a9624417608d84 # v6
        with:
          # Pinned to match Makefile's GOLANGCI_LINT_VERSION. Bump both together.
          # Upgrading to v2.x also requires bumping the action to v7+.
          version: v1.64.8

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
      # The opencode adapter embeds a TypeScript plugin. Without bun, the
      # tests that parse and exercise it skip silently, and a broken plugin
      # ships as "status never updates" with every Go test green.
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest
      - name: Run tests with race detector
        run: go test -race -v ./...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.24"
      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Run E2E tests
        run: go test -tags e2e -v -timeout 120s ./test/e2e/
